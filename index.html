<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToolBox — 無料オンラインファイルツール</title>
<style>
  :root{
    --accent:#8d75f0;
    --accent-dark:#7a61e8;
    --header-bg:#15151d;
    --panel-bg:#1d1d27;
    --text:#2b2b33;
    --muted:#8a8a95;
    --border:#e6e6ee;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI","Hiragino Sans","Yu Gothic UI",Meiryo,sans-serif;color:var(--text);background:#fff;min-height:100vh;display:flex;flex-direction:column}

  /* ───────── header ───────── */
  header{background:var(--header-bg);color:#ddd;display:flex;align-items:center;gap:8px;padding:0 24px;height:56px;position:sticky;top:0;z-index:100}
  .brand{color:#fff;text-decoration:none;font-weight:700;font-size:18px;margin-right:24px;display:flex;align-items:center;gap:8px}
  .brand .logo{background:var(--accent);border-radius:8px;width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;font-size:16px}
  nav{display:flex;height:100%}
  .menu{position:relative;height:100%;display:flex;align-items:center}
  .menu>button{background:none;border:none;color:#ccc;font-size:14px;padding:0 16px;height:100%;cursor:pointer;display:flex;align-items:center;gap:6px}
  .menu>button:hover,.menu:hover>button,.menu.open>button{color:#fff;background:#22222e}
  .dropdown{display:none;position:absolute;top:100%;left:0;background:var(--panel-bg);border:1px solid #2c2c3a;border-radius:10px;padding:10px;min-width:230px;box-shadow:0 12px 30px rgba(0,0,0,.45)}
  .menu:hover .dropdown,.menu.open .dropdown{display:block}
  .dropdown.cols2{min-width:480px;column-count:2;column-gap:6px}
  .dropdown a{display:flex;align-items:center;gap:10px;color:#cfcfda;text-decoration:none;font-size:13.5px;padding:9px 12px;border-radius:8px;break-inside:avoid}
  .dropdown a:hover{background:#2a2a38;color:#fff}
  .dropdown a .ico{width:18px;text-align:center;opacity:.85}
  .dropdown a .soon{margin-left:auto;font-size:10px;color:#7d7d8c;border:1px solid #3a3a4a;border-radius:99px;padding:1px 7px}
  .dropdown .sub{position:relative}
  .dropdown .subhead{display:flex;align-items:center;gap:10px;color:#cfcfda;font-size:13.5px;padding:9px 12px;border-radius:8px;cursor:default}
  .dropdown .sub:hover>.subhead{background:#2a2a38;color:#fff}
  .dropdown .subhead .arrow{margin-left:auto;color:#7d7d8c}
  .dropdown .flyout{display:none;position:absolute;left:100%;top:-10px;background:var(--panel-bg);border:1px solid #2c2c3a;border-radius:10px;padding:10px;min-width:210px;box-shadow:0 12px 30px rgba(0,0,0,.45)}
  .dropdown .sub:hover .flyout,.dropdown .sub.open .flyout{display:block}
  @media (max-width:900px){
    .dropdown .flyout{position:static;border:none;box-shadow:none;padding:0 0 0 20px;min-width:0}
  }

  main{flex:1;display:flex;flex-direction:column}

  /* ───────── tool page ───────── */
  .tool-head{background:#f7f7fa;border-bottom:1px solid var(--border);padding:28px 40px}
  .tool-head h1{font-size:26px;font-weight:600}
  .tool-head p{color:var(--muted);font-size:14px;margin-top:8px}
  .tool-body{flex:1;display:flex;flex-direction:column;align-items:center;padding:48px 24px 64px}
  .note{background:#f4f1ff;border:1px solid #ded5ff;color:#5b48b8;font-size:13px;border-radius:10px;padding:10px 16px;margin-bottom:28px;max-width:680px}

  .dropzone{display:flex;flex-direction:column;align-items:center;gap:14px;padding:48px 80px;border:2px dashed transparent;border-radius:16px;cursor:pointer;transition:.15s}
  .dropzone.drag{border-color:var(--accent);background:#faf8ff}
  .btn-primary{background:var(--accent);color:#fff;border:none;font-size:15px;font-weight:600;padding:16px 48px;border-radius:6px;cursor:pointer}
  .btn-primary:hover{background:var(--accent-dark)}
  .btn-primary:disabled{background:#c9c2e8;cursor:not-allowed}
  .dz-or{color:#b9b9c2;font-size:12px;display:flex;align-items:center;gap:12px}
  .dz-or::before,.dz-or::after{content:"";width:60px;height:1px;background:#e3e3ea}
  .dz-hint{color:#b9b9c2;font-size:14px}

  .filelist{list-style:none;width:100%;max-width:620px;margin-top:8px}
  .filelist li{display:flex;align-items:center;gap:10px;border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:14px;background:#fff}
  .filelist .fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .filelist .fsize{color:var(--muted);font-size:12px}
  .filelist button{background:#f1f1f6;border:none;border-radius:6px;width:28px;height:28px;cursor:pointer;color:#555;font-size:13px}
  .filelist button:hover{background:#e4e4ee}

  .opts{display:grid;grid-template-columns:auto auto;gap:12px 16px;align-items:center;margin-top:24px;font-size:14px}
  .opts label{color:#555;text-align:right}
  .opts input,.opts select{border:1px solid #d4d4de;border-radius:8px;padding:8px 12px;font-size:14px;min-width:200px;background:#fff}

  .runbar{margin-top:28px;display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:620px}
  .status{color:var(--muted);font-size:13px;text-align:center;white-space:pre-line}
  progress{width:100%;max-width:420px;height:8px;accent-color:var(--accent)}
  .error{background:#fdf0f0;border:1px solid #f3c9c9;color:#b04444;border-radius:10px;padding:12px 18px;font-size:13px;max-width:620px;white-space:pre-wrap}

  .results{width:100%;max-width:620px;margin-top:10px}
  .results .res{display:flex;align-items:center;gap:12px;border:1px solid #d9f0e1;background:#f3fbf6;border-radius:10px;padding:12px 16px;margin-bottom:10px;font-size:14px}
  .results .res .fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .results a.dl{background:#27ae60;color:#fff;text-decoration:none;font-size:13px;font-weight:600;padding:8px 18px;border-radius:6px;white-space:nowrap}
  .results a.dl:hover{background:#219252}
  .results audio,.results img,.results video{max-width:100%;margin-top:8px;border-radius:8px}

  /* ───────── home ───────── */
  .hero{background:linear-gradient(135deg,#1a1a26 0%,#272038 100%);color:#fff;text-align:center;padding:72px 24px}
  .hero h1{font-size:34px;font-weight:700}
  .hero p{color:#b8b3cc;margin-top:14px;font-size:15px}
  .home-cats{max-width:1100px;margin:0 auto;padding:48px 24px;width:100%}
  .home-cats h2{font-size:19px;margin:36px 0 16px;display:flex;align-items:center;gap:10px}
  .home-cats h2:first-child{margin-top:0}
  .cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
  .card{border:1px solid var(--border);border-radius:12px;padding:16px;text-decoration:none;color:var(--text);display:flex;flex-direction:column;gap:6px;transition:.12s;background:#fff;position:relative}
  .card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(141,117,240,.12)}
  .card .t{font-weight:600;font-size:14.5px;display:flex;align-items:center;gap:8px}
  .card .d{color:var(--muted);font-size:12.5px;line-height:1.5}
  .card .soon{position:absolute;top:12px;right:12px;font-size:10px;color:#9a93b5;border:1px solid #ddd8ee;border-radius:99px;padding:2px 8px}

  /* recorder / tts */
  .recbox{display:flex;flex-direction:column;align-items:center;gap:18px;margin-top:8px}
  .recbox video{max-width:560px;width:100%;border-radius:12px;background:#000}
  .btn-danger{background:#e05656;color:#fff;border:none;font-size:15px;font-weight:600;padding:16px 48px;border-radius:6px;cursor:pointer}
  .btn-danger:hover{background:#c94747}
  .ttsbox{width:100%;max-width:620px;display:flex;flex-direction:column;gap:14px}
  .ttsbox textarea{border:1px solid #d4d4de;border-radius:10px;padding:14px;font-size:14px;min-height:140px;font-family:inherit;resize:vertical}
  .ttsrow{display:flex;gap:14px;align-items:center;flex-wrap:wrap;font-size:13px;color:#555}

  footer{background:#f7f7fa;border-top:1px solid var(--border);text-align:center;color:var(--muted);font-size:12.5px;padding:22px}
  .filewarn{background:#fff7e0;border-bottom:1px solid #f0dfa8;color:#8a6d1a;font-size:13px;padding:10px 24px;text-align:center;line-height:1.7}
</style>

<body>

<header>
  <a class="brand" href="#/"><span class="logo">🧰</span>ToolBox</a>
  <nav id="nav"></nav>
</header>

<main id="app"></main>

<footer>🔒 すべての処理はお使いのブラウザ内で完結します。ファイルがサーバーに送信されることはありません。</footer>

<script src="vendor/pdf-lib.min.js"></script>
<script src="vendor/jszip.min.js"></script>
<script src="vendor/pdf.min.js"></script>
<script>
"use strict";
if(window.pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc = "vendor/pdf.worker.min.js";

/* ═══════════════ helpers ═══════════════ */
const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const fmtSize = n => n < 1024 ? n + " B" : n < 1048576 ? (n/1024).toFixed(1) + " KB" : (n/1048576).toFixed(2) + " MB";
const baseName = n => n.replace(/\.[^.]+$/, "");
const extOf = n => { const m = /\.([a-z0-9]+)$/i.exec(n); return m ? m[1].toLowerCase() : ""; };

function loadScript(src){
  return new Promise((res, rej) => {
    const s = document.createElement("script");
    s.src = src; s.onload = res;
    s.onerror = () => rej(new Error("ライブラリの読み込みに失敗しました: " + src));
    document.head.appendChild(s);
  });
}

async function zipFiles(items){
  const z = new JSZip();
  for(const it of items) z.file(it.name, it.blob);
  return await z.generateAsync({type:"blob"});
}

function mimeOf(name){
  const map = {pdf:"application/pdf",png:"image/png",jpg:"image/jpeg",jpeg:"image/jpeg",webp:"image/webp",gif:"image/gif",
    mp4:"video/mp4",webm:"video/webm",mov:"video/quicktime",avi:"video/x-msvideo",mkv:"video/x-matroska",
    mp3:"audio/mpeg",wav:"audio/wav",ogg:"audio/ogg",flac:"audio/flac",m4a:"audio/mp4",zip:"application/zip",txt:"text/plain"};
  return map[extOf(name)] || "application/octet-stream";
}

function parseRanges(s, max){
  const out = new Set();
  for(const part of String(s).split(",")){
    const t = part.trim(); if(!t) continue;
    const m = /^(\d+)(?:\s*-\s*(\d+))?$/.exec(t);
    if(!m) throw new Error("ページ範囲の形式が正しくありません: " + t);
    const a = +m[1], b = m[2] ? +m[2] : a;
    if(a < 1 || b > max || a > b) throw new Error(`ページ範囲が不正です (1〜${max} の間で指定してください): ${t}`);
    for(let i = a; i <= b; i++) out.add(i - 1);
  }
  if(!out.size) throw new Error("ページ範囲を入力してください (例: 1-3,5)");
  return [...out].sort((x, y) => x - y);
}

/* ── lazy-loaded conversion libraries ── */
const LIBS = {
  mammoth:  {src:"vendor/mammoth.min.js",          check:() => window.mammoth},
  xlsx:     {src:"vendor/xlsx.full.min.js",        check:() => window.XLSX},
  html2pdf: {src:"vendor/html2pdf.bundle.min.js",  check:() => window.html2pdf},
  pptxgen:  {src:"vendor/pptxgen.bundle.js",       check:() => window.PptxGenJS},
};
async function lib(name){
  const l = LIBS[name];
  if(!l.check()) await loadScript(l.src);
  return l.check();
}

const escXml = s => String(s).replace(/[&<>"']/g, c =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&apos;"}[c]));

/* PDF からページごとのテキスト行を抽出 (列の区切りはタブ) */
async function extractPdfText(file, ui){
  const doc = await pdfjsLib.getDocument({data: await file.arrayBuffer()}).promise;
  const pages = [];
  for(let p = 1; p <= doc.numPages; p++){
    if(ui) ui.status(`テキストを抽出中 (${p}/${doc.numPages})…`);
    const tc = await (await doc.getPage(p)).getTextContent();
    const lines = new Map();
    for(const it of tc.items){
      if(!it.str || !it.str.trim()) continue;
      const y = Math.round(it.transform[5]);
      let key = null;
      for(const k of lines.keys()) if(Math.abs(k - y) <= 3){ key = k; break; }
      if(key === null){ key = y; lines.set(key, []); }
      lines.get(key).push({x: it.transform[4], w: it.width || 0, str: it.str});
    }
    const sorted = [...lines.entries()].sort((a, b) => b[0] - a[0]).map(([, items]) => {
      items.sort((a, b) => a.x - b.x);
      let line = "", prevEnd = null;
      for(const it of items){
        if(prevEnd !== null && it.x - prevEnd > 15) line += "\t";
        line += it.str;
        prevEnd = it.x + it.w;
      }
      return line;
    });
    pages.push(sorted);
  }
  if(pages.every(ls => ls.length === 0))
    throw new Error("この PDF からテキストを抽出できませんでした。スキャン画像の PDF の可能性があります。");
  return pages;
}

/* テキスト行から最小構成の .docx を生成 */
async function buildDocx(pages){
  const z = new JSZip();
  z.file("[Content_Types].xml",
    `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>` +
    `<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">` +
    `<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>` +
    `<Default Extension="xml" ContentType="application/xml"/>` +
    `<Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>` +
    `</Types>`);
  z.file("_rels/.rels",
    `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>` +
    `<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">` +
    `<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>` +
    `</Relationships>`);
  const body = pages.map((lines, pi) =>
    lines.map(l => `<w:p><w:r><w:t xml:space="preserve">${escXml(l.replace(/\t/g, "    "))}</w:t></w:r></w:p>`).join("") +
    (pi < pages.length - 1 ? `<w:p><w:r><w:br w:type="page"/></w:r></w:p>` : "")
  ).join("");
  z.file("word/document.xml",
    `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>` +
    `<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">` +
    `<w:body>${body || "<w:p/>"}</w:body></w:document>`);
  return await z.generateAsync({type:"blob",
    mimeType:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"});
}

/* HTML 文字列を A4 PDF に変換 (html2pdf.js) */
async function htmlToPdfBlob(html, ui){
  await lib("html2pdf");
  if(ui) ui.status("PDF を生成中…");
  /* html2canvas は通常フロー内の要素しか描画できないため、
     サイズ 0 のラッパーで隠した上で文書フロー内に配置する */
  const outer = document.createElement("div");
  outer.style.cssText = "position:absolute;left:0;top:0;width:0;height:0;overflow:hidden";
  const host = document.createElement("div");
  host.style.cssText = "width:794px;background:#fff;color:#000;" +
    "font-family:'Yu Gothic','Hiragino Sans',sans-serif;font-size:13px;line-height:1.7;padding:24px";
  host.innerHTML = `<style>table{border-collapse:collapse}td,th{border:1px solid #999;padding:4px 8px;font-size:11px}</style>` + html;
  outer.appendChild(host);
  document.body.appendChild(outer);
  try{
    const blob = await html2pdf().set({
      margin:[10,10,10,10],
      html2canvas:{scale:2, useCORS:true, scrollX:0, scrollY:0},
      jsPDF:{unit:"mm", format:"a4", orientation:"portrait"},
      pagebreak:{mode:["css","legacy"]},
    }).from(host).toPdf().outputPdf("blob");
    if(!blob || !blob.size) throw new Error("PDF の生成に失敗しました。");
    return blob;
  } finally { outer.remove(); }
}

/* PDF の各ページを画像に変換 */
async function pdfToImages(file, format, scale, ui){
  const doc = await pdfjsLib.getDocument({data: await file.arrayBuffer()}).promise;
  const mime = format === "jpeg" ? "image/jpeg" : "image/png";
  const ext = format === "jpeg" ? "jpg" : "png";
  const items = [];
  for(let p = 1; p <= doc.numPages; p++){
    if(ui) ui.status(`ページ ${p}/${doc.numPages} を変換中…`);
    const page = await doc.getPage(p);
    const vp = page.getViewport({scale});
    const canvas = document.createElement("canvas");
    canvas.width = vp.width; canvas.height = vp.height;
    const ctx = canvas.getContext("2d");
    if(format === "jpeg"){ ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, canvas.width, canvas.height); }
    await page.render({canvasContext: ctx, viewport: vp}).promise;
    const blob = await new Promise(r => canvas.toBlob(r, mime, 0.92));
    items.push({name:`${baseName(file.name)}_p${p}.${ext}`, blob});
  }
  return items;
}

/* 画像群を 1 つの PDF にまとめる */
async function imagesToPdf(files, ui){
  const doc = await PDFLib.PDFDocument.create();
  for(let i = 0; i < files.length; i++){
    if(ui) ui.status(`画像 ${i+1}/${files.length} を追加中…`);
    const f = files[i];
    let img;
    if(f.type === "image/jpeg") img = await doc.embedJpg(await f.arrayBuffer());
    else if(f.type === "image/png") img = await doc.embedPng(await f.arrayBuffer());
    else {
      const bmp = await createImageBitmap(f);
      const c = document.createElement("canvas");
      c.width = bmp.width; c.height = bmp.height;
      c.getContext("2d").drawImage(bmp, 0, 0);
      const blob = await new Promise(r => c.toBlob(r, "image/png"));
      img = await doc.embedPng(await blob.arrayBuffer());
    }
    const w = img.width * 0.75, h = img.height * 0.75;
    doc.addPage([w, h]).drawImage(img, {x:0, y:0, width:w, height:h});
  }
  return new Blob([await doc.save()], {type:"application/pdf"});
}

/* ── audio helpers ── */
let _actx = null;
const actx = () => _actx || (_actx = new (window.AudioContext || window.webkitAudioContext)());
async function decodeAudio(file){
  try{ return await actx().decodeAudioData(await file.arrayBuffer()); }
  catch(e){ throw new Error(`「${file.name}」を音声として読み込めませんでした。対応形式か確認してください。`); }
}
function makeBuffer(channels, length, rate){
  return actx().createBuffer(channels, Math.max(1, length), rate);
}
function bufferToWav(buf){
  const nCh = buf.numberOfChannels, rate = buf.sampleRate, len = buf.length;
  const bytes = 44 + len * nCh * 2;
  const ab = new ArrayBuffer(bytes), v = new DataView(ab);
  const wstr = (o, s) => { for(let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  wstr(0,"RIFF"); v.setUint32(4, bytes - 8, true); wstr(8,"WAVE"); wstr(12,"fmt ");
  v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,nCh,true);
  v.setUint32(24,rate,true); v.setUint32(28,rate*nCh*2,true); v.setUint16(32,nCh*2,true); v.setUint16(34,16,true);
  wstr(36,"data"); v.setUint32(40, len*nCh*2, true);
  const chans = []; for(let c = 0; c < nCh; c++) chans.push(buf.getChannelData(c));
  let o = 44;
  for(let i = 0; i < len; i++) for(let c = 0; c < nCh; c++){
    let s = Math.max(-1, Math.min(1, chans[c][i]));
    v.setInt16(o, s < 0 ? s * 0x8000 : s * 0x7FFF, true); o += 2;
  }
  return new Blob([ab], {type:"audio/wav"});
}
async function renderOffline(buf, build, lengthOverride){
  const ctx = new OfflineAudioContext(buf.numberOfChannels, lengthOverride || buf.length, buf.sampleRate);
  const src = ctx.createBufferSource(); src.buffer = buf;
  build(ctx, src);
  src.start();
  return await ctx.startRendering();
}

/* ── ffmpeg (lazy) ── */
let _ff = null;
async function getFFmpeg(ui){
  if(_ff) return _ff;
  if(location.protocol === "file:")
    throw new Error("このツールは index.html を直接開いた状態 (file://) では動作しません。" +
      "「サイトを起動.bat」から起動するか、Web 公開版の URL からご利用ください。");
  ui.status("FFmpeg エンジンを読み込み中…\n(初回のみ約 30MB の読み込みが発生します。しばらくお待ちください)");
  await loadScript("vendor/ffmpeg.js");
  const ff = new FFmpegWASM.FFmpeg();
  await ff.load({
    coreURL: new URL("vendor/ffmpeg-core.js", location.href).href,
    wasmURL: new URL("vendor/ffmpeg-core.wasm", location.href).href,
  });
  _ff = ff;
  return ff;
}
async function runFF(ui, inputs, args, outName, extraFiles){
  const ff = await getFFmpeg(ui);
  const onProg = p => ui.progress(Math.min(1, Math.max(0, p.progress || 0)));
  ff.on("progress", onProg);
  const written = [];
  try{
    for(const [name, file] of inputs){
      ui.status("ファイルを準備中…");
      await ff.writeFile(name, new Uint8Array(await file.arrayBuffer()));
      written.push(name);
    }
    for(const [name, data] of (extraFiles || [])){
      await ff.writeFile(name, data); written.push(name);
    }
    ui.status("変換処理を実行中…(ファイルの長さによっては数分かかります)");
    const code = await ff.exec(args);
    let data;
    try{ data = await ff.readFile(outName); }
    catch(e){ throw new Error("変換に失敗しました (FFmpeg 終了コード: " + code + ")。別の形式・設定でお試しください。"); }
    if(!data || !data.length) throw new Error("変換結果が空でした。別の形式・設定でお試しください。");
    return new Blob([data.buffer], {type: mimeOf(outName)});
  } finally {
    ff.off("progress", onProg);
    for(const n of written){ try{ await ff.deleteFile(n); }catch(e){} }
    try{ await ff.deleteFile(outName); }catch(e){}
  }
}

"audio-merge":{
  cat:"audio", ico:"🪢", name:"オーディオをマージ", action:"マージ",
  desc:"複数の音声ファイルを 1 つに連結します。出力は WAV 形式です。",
  accept:"audio/*", multiple:true, minFiles:2, sortable:true,
  async run(files, o, ui){
    const bufs = [];
    for(let i = 0; i < files.length; i++){
      ui.status(`読み込み中 (${i+1}/${files.length})…`);
      bufs.push(await decodeAudio(files[i]));
    }
    const rate = bufs[0].sampleRate;
    const nCh = Math.max(...bufs.map(b => b.numberOfChannels));
    const total = bufs.reduce((s, b) => s + b.length, 0);
    const out = makeBuffer(nCh, total, rate);
    let off = 0;
    for(const b of bufs){
      for(let c = 0; c < nCh; c++)
        out.copyToChannel(b.getChannelData(Math.min(c, b.numberOfChannels - 1)), c, off);
      off += b.length;
    }
    return [{name:"マージ済み.wav", blob:bufferToWav(out)}];
  }},

"audio-convert":{
  cat:"conv", ico:"🎵", name:"オーディオコンバータ", action:"変換",
  desc:"音声ファイルを MP3 / WAV / FLAC / OGG に変換します。",
  accept:"audio/*,video/*",
  options:[{key:"format", label:"出力形式", type:"select", def:"mp3",
    choices:[["mp3","MP3"],["wav","WAV"],["flac","FLAC"],["ogg","OGG"]]}],
  async run(files, o, ui){
    const [[name, f]] = ffIn(files);
    const out = "out." + o.format;
    const codec = {mp3:["-c:a","libmp3lame","-q:a","2"], wav:["-c:a","pcm_s16le"],
                   flac:["-c:a","flac"], ogg:["-c:a","libvorbis"]}[o.format];
    const blob = await runFF(ui, [[name, f]], ["-i", name, "-vn", ...codec, out], out);
    return [{name:`${baseName(f.name)}.${o.format}`, blob}];
  }},

"video-convert":{
  cat:"conv", ico:"🎞", name:"ビデオコンバーター", action:"変換",
  desc:"動画ファイルを MP4 / WebM / GIF などに変換します。",
  accept:"video/*",
  options:[{key:"format", label:"出力形式", type:"select", def:"mp4",
    choices:[["mp4","MP4"],["webm","WebM"],["gif","GIF (アニメ)"],["mp3","MP3 (音声のみ抽出)"],["wav","WAV (音声のみ抽出)"]]}],
  async run(files, o, ui){
    const [[name, f]] = ffIn(files);
    const out = "out." + o.format;
    let args;
    if(o.format === "mp4") args = ["-i", name, ...X264, out];
    else if(o.format === "webm") args = ["-i", name, "-c:v", "libvpx", "-b:v", "1M", "-c:a", "libvorbis", out];
    else if(o.format === "gif") args = ["-i", name, "-vf", "fps=10,scale=480:-1:flags=lanczos", out];
    else if(o.format === "mp3") args = ["-i", name, "-vn", "-c:a", "libmp3lame", "-q:a", "2", out];
    else args = ["-i", name, "-vn", "-c:a", "pcm_s16le", out];
    const blob = await runFF(ui, [[name, f]], args, out);
    return [{name:`${baseName(f.name)}.${o.format}`, blob}];
  }},

"image-convert":{
  cat:"conv", ico:"🖼", name:"画像コンバーター", action:"変換",
  desc:"画像を PNG / JPEG / WebP に変換します。複数ファイルの一括変換に対応。",
  accept:"image/*", multiple:true,
  options:[
    {key:"format", label:"出力形式", type:"select", def:"png",
     choices:[["png","PNG"],["jpeg","JPEG"],["webp","WebP"]]},
    {key:"quality", label:"品質 (%)", type:"number", def:92, min:10, max:100},
  ],
  async run(files, o, ui){
    const ext = o.format === "jpeg" ? "jpg" : o.format;
    const results = [];
    for(let i = 0; i < files.length; i++){
      ui.status(`変換中 (${i+1}/${files.length})…`);
      const f = files[i];
      let bmp;
      try{ bmp = await createImageBitmap(f); }
      catch(e){ throw new Error(`「${f.name}」を画像として読み込めませんでした。`); }
      const c = document.createElement("canvas");
      c.width = bmp.width; c.height = bmp.height;
      const ctx = c.getContext("2d");
      if(o.format === "jpeg"){ ctx.fillStyle = "#fff"; ctx.fillRect(0,0,c.width,c.height); }
      ctx.drawImage(bmp, 0, 0);
      const blob = await new Promise(r => c.toBlob(r, "image/" + o.format, (+o.quality)/100));
      results.push({name:`${baseName(f.name)}.${ext}`, blob});
    }
    return results;
  }},

"archive-zip":{
  cat:"conv", ico:"🗜", name:"アーカイブ変換 (ZIP 作成)", action:"ZIP 作成",
  desc:"複数のファイルを 1 つの ZIP アーカイブにまとめます。",
  accept:"*/*", multiple:true,
  async run(files, o, ui){
    ui.status("圧縮中…");
    const z = new JSZip();
    for(const f of files) z.file(f.name, f);
    const blob = await z.generateAsync({type:"blob", compression:"DEFLATE"});
    return [{name:"アーカイブ.zip", blob}];
  }},

"archive-unzip":{
  cat:"conv", ico:"📦", name:"アーカイブ解凍ツール", action:"解凍",
  desc:"ZIP アーカイブの中身を取り出します。",
  accept:".zip,application/zip,application/x-zip-compressed",
  async run(files, o, ui){
    ui.status("解凍中…");
    const z = await JSZip.loadAsync(await files[0].arrayBuffer());
    const results = [];
    for(const [path, entry] of Object.entries(z.files)){
      if(entry.dir) continue;
      const blob = await entry.async("blob");
      results.push({name: path.split("/").pop() || path, blob});
    }
    if(!results.length) throw new Error("この ZIP にはファイルが含まれていません。");
    return results;
  }},

function buildNav(){
  const nav = $("#nav");
  nav.innerHTML = CATEGORIES.map(cat => `
    <div class="menu">

      <div class="dropdown ${cat.tools.length > 9 ? "cols2" : ""}">

          return navLink(e);
        }).join("")}
      </div>

  /* ホバーに加えてクリック・タップでも開閉できるようにする */
  nav.querySelectorAll(".menu").forEach(m => {
    m.querySelector("button").addEventListener("click", e => {
      e.stopPropagation();

    });
  });
  document.addEventListener("click", () =>
    nav.querySelectorAll(".open").forEach(x => x.classList.remove("open")));
}

function renderRecorder(t){
  const isAudio = t.kind === "mic";
  app.innerHTML = toolHead(t) + `
    <div class="tool-body">
      <div class="note">⏺ 「開始」を押すと${isAudio ? "マイク" : t.kind === "screen" ? "画面共有" : "カメラ"}の許可を求められます。録画・録音データはこの端末から外に出ません。</div>
      <div class="recbox">
        ${!isAudio ? '<video id="preview" autoplay muted playsinline style="display:none"></video>' : ""}
        <div style="display:flex;gap:12px">
          <button id="recStart" class="btn-primary">${isAudio ? "🎙 録音開始" : "⏺ 録画開始"}</button>
          <button id="recStop" class="btn-danger" style="display:none">⏹ 停止</button>
        </div>
        <div id="status" class="status"></div>
        <div id="results" class="results"></div>
      </div>
    </div>`;
  let rec = null, chunks = [], timer = null, t0 = 0;
  const status = $("#status");
  $("#recStart").onclick = async () => {
    try{
      stopStream();
      if(t.kind === "mic") activeStream = await navigator.mediaDevices.getUserMedia({audio:true});
      else if(t.kind === "screen") activeStream = await navigator.mediaDevices.getDisplayMedia({video:true, audio:true});
      else activeStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
    }catch(e){ status.textContent = "デバイスへのアクセスが許可されませんでした。"; return; }
    const pv = $("#preview");
    if(pv){ pv.style.display = "block"; pv.srcObject = activeStream; }
    chunks = [];
    rec = new MediaRecorder(activeStream);
    rec.ondataavailable = e => { if(e.data.size) chunks.push(e.data); };
    rec.onstop = () => {
      const mime = rec.mimeType || (isAudio ? "audio/webm" : "video/webm");
      const blob = new Blob(chunks, {type: mime});
      const ext = mime.includes("mp4") ? "mp4" : "webm";
      showResults($("#results"), [{name:`${isAudio ? "録音" : "録画"}_${new Date().toISOString().slice(0,19).replace(/[:T]/g,"-")}.${ext}`, blob}]);
      stopStream();
      if(pv){ pv.srcObject = null; pv.style.display = "none"; }
      $("#recStart").style.display = ""; $("#recStop").style.display = "none";
      clearInterval(timer); status.textContent = "完了しました。下からダウンロードできます。";
    };
    activeStream.getVideoTracks().forEach(tr => tr.onended = () => { if(rec && rec.state !== "inactive") rec.stop(); });
    rec.start();
    t0 = Date.now();
    timer = setInterval(() => { status.textContent = "録画中… " + Math.floor((Date.now()-t0)/1000) + " 秒"; }, 500);
    $("#recStart").style.display = "none"; $("#recStop").style.display = "";
  };
  $("#recStop").onclick = () => { if(rec && rec.state !== "inactive") rec.stop(); };
}

      <div class="ttsbox">
        <textarea id="ttsText" placeholder="読み上げたいテキストを入力してください…">こんにちは。これは音声合成のテストです。</textarea>
        <div class="ttsrow">
          <label>音声: <select id="ttsVoice"></select></label>
          <label>速度: <input id="ttsRate" type="range" min="0.5" max="2" step="0.1" value="1"></label>
          <label>高さ: <input id="ttsPitch" type="range" min="0.5" max="2" step="0.1" value="1"></label>
        </div>
        <div style="display:flex;gap:12px;justify-content:center">
          <button id="ttsPlay" class="btn-primary">▶ 読み上げ</button>
          <button id="ttsStop" class="btn-danger">⏹ 停止</button>
        </div>
        <div class="status" style="text-align:center">※ 音声のダウンロードには対応していません(ブラウザ標準機能の制限)。</div>
      </div>
    </div>`;
  const sel = $("#ttsVoice");
  function fillVoices(){
    const vs = speechSynthesis.getVoices();
    const sorted = [...vs.filter(v => v.lang.startsWith("ja")), ...vs.filter(v => !v.lang.startsWith("ja"))];
    sel.innerHTML = sorted.map((v, i) => `<option value="${esc(v.name)}">${esc(v.name)} (${esc(v.lang)})</option>`).join("");
  }
  fillVoices();
  speechSynthesis.onvoiceschanged = fillVoices;
  $("#ttsPlay").onclick = () => {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance($("#ttsText").value);
    const v = speechSynthesis.getVoices().find(v => v.name === sel.value);
    if(v) u.voice = v;
    u.rate = +$("#ttsRate").value; u.pitch = +$("#ttsPitch").value;
    speechSynthesis.speak(u);
  };
  $("#ttsStop").onclick = () => speechSynthesis.cancel();
}

function showResults(container, items){
  container.innerHTML = "";
  for(const it of items){
    const url = URL.createObjectURL(it.blob);
    const div = document.createElement("div");
    div.className = "res";
    div.innerHTML = `<span class="fname">✅ ${esc(it.name)} <span style="color:var(--muted);font-size:12px">(${fmtSize(it.blob.size)})</span></span>
      <a class="dl" href="${url}" download="${esc(it.name)}">ダウンロード</a>`;
    container.appendChild(div);
    const mt = it.blob.type;
    if(mt.startsWith("audio")){ const a = document.createElement("audio"); a.controls = true; a.src = url; div.after(a); }
    else if(mt.startsWith("video")){ const v = document.createElement("video"); v.controls = true; v.src = url; v.style.maxHeight = "320px"; div.after(v); }
    else if(mt.startsWith("image")){ const im = document.createElement("img"); im.src = url; im.style.maxHeight = "260px"; div.after(im); }
  }
}

function renderTool(t){
  if(t.type === "coming") return renderComing(t);
  if(t.type === "recorder") return renderRecorder(t);
  if(t.type === "tts") return renderTTS(t);
  if(t.type === "hub") return renderHub(t);

  const minFiles = t.minFiles || 1;
  app.innerHTML = toolHead(t) + `
    <div class="tool-body">
      ${t.hint ? `<div class="note">💡 ${esc(t.hint)}</div>` : ""}
      <div class="dropzone" id="drop">
        <button class="btn-primary" type="button">ファイルを選択</button>
        <div class="dz-or">または</div>
        <div class="dz-hint">ファイルをここにドロップ</div>
      </div>
      <input type="file" id="fileInput" hidden ${t.multiple ? "multiple" : ""} accept="${esc(t.accept || "*/*")}">
      <ul class="filelist" id="fileList"></ul>
      <div class="opts" id="opts"></div>
      <div class="runbar">
        <button class="btn-primary" id="runBtn" disabled>${esc(t.action || "実行")}</button>
        <div class="status" id="status"></div>
        <progress id="prog" max="1" value="0" style="display:none"></progress>
        <div class="error" id="err" style="display:none"></div>
        <div class="results" id="results"></div>
      </div>
    </div>`;

  let files = [];
  const drop = $("#drop"), input = $("#fileInput"), list = $("#fileList"),
        runBtn = $("#runBtn"), status = $("#status"), prog = $("#prog"),
        err = $("#err"), results = $("#results");

  /* options form */
  const optsEl = $("#opts");
  if(t.options){
    optsEl.innerHTML = t.options.map(op => {
      let inp;
      if(op.type === "select")
        inp = `<select data-key="${op.key}">${op.choices.map(([v, l]) =>
          `<option value="${esc(v)}" ${String(v) === String(op.def) ? "selected" : ""}>${esc(l)}</option>`).join("")}</select>`;
      else if(op.type === "number")
        inp = `<input type="number" data-key="${op.key}" value="${op.def}" ${op.min != null ? `min="${op.min}"` : ""} ${op.max != null ? `max="${op.max}"` : ""} step="${op.step || 1}">`;
      else
        inp = `<input type="text" data-key="${op.key}" value="${esc(op.def || "")}" placeholder="${esc(op.placeholder || "")}">`;
      return `<label>${esc(op.label)}</label>${inp}`;
    }).join("");
  }
  const getOpts = () => {
    const o = {};
    optsEl.querySelectorAll("[data-key]").forEach(el => o[el.dataset.key] = el.value);
    return o;
  };

  function addFiles(fl){
    const arr = [...fl];
    if(!arr.length) return;
    files = t.multiple ? files.concat(arr) : [arr[arr.length - 1]];
    renderList();
  }
  function renderList(){
    list.innerHTML = "";
    files.forEach((f, i) => {
      const li = document.createElement("li");
      li.innerHTML = `<span class="fname">📄 ${esc(f.name)}</span><span class="fsize">${fmtSize(f.size)}</span>`;
      if(t.sortable){
        const up = document.createElement("button"); up.textContent = "↑";
        up.onclick = () => { if(i > 0){ [files[i-1], files[i]] = [files[i], files[i-1]]; renderList(); } };
        const dn = document.createElement("button"); dn.textContent = "↓";
        dn.onclick = () => { if(i < files.length - 1){ [files[i+1], files[i]] = [files[i], files[i+1]]; renderList(); } };
        li.append(up, dn);
      }
      const rm = document.createElement("button"); rm.textContent = "✕";
      rm.onclick = () => { files.splice(i, 1); renderList(); };
      li.append(rm);
      list.appendChild(li);
    });
    runBtn.disabled = files.length < minFiles;
    if(files.length && files.length < minFiles)
      status.textContent = `あと ${minFiles - files.length} 個のファイルを追加してください。`;
    else if(!running) status.textContent = "";
  }

  drop.onclick = () => input.click();
  input.onchange = () => { addFiles(input.files); input.value = ""; };
  drop.ondragover = e => { e.preventDefault(); drop.classList.add("drag"); };
  drop.ondragleave = () => drop.classList.remove("drag");
  drop.ondrop = e => { e.preventDefault(); drop.classList.remove("drag"); addFiles(e.dataTransfer.files); };

  let running = false;
  const ui = {
    status(m){ status.textContent = m; },
    progress(r){ prog.style.display = ""; prog.value = r; },
  };
  runBtn.onclick = async () => {
    if(running || files.length < minFiles) return;
    running = true;
    runBtn.disabled = true;
    err.style.display = "none"; results.innerHTML = "";
    prog.style.display = "none"; prog.value = 0;
    try{
      const out = await t.run(files, getOpts(), ui);
      showResults(results, out);
      if(!status.textContent.includes("サイズ")) status.textContent = "✅ 完了しました!";
    }catch(e){
      console.error(e);
      err.textContent = "⚠ " + (e && e.message ? e.message : "処理に失敗しました。");
      err.style.display = "";
      status.textContent = "";
    }finally{
      prog.style.display = "none";
      running = false;
      runBtn.disabled = files.length < minFiles;
    }
  };
}

/* ═══════════════ router ═══════════════ */
function route(){
  stopStream();
  window.scrollTo(0, 0);
  const hash = location.hash.replace(/^#\/?/, "");
  if(!hash){ renderHome(); document.title = "ToolBox — 無料オンラインファイルツール"; return; }
  const t = TOOLS[hash];
  if(!t){ renderHome(); return; }
  document.title = t.name + " — ToolBox";
  renderTool(t);
}
buildNav();
if(!window.PDFLib || !window.pdfjsLib || !window.JSZip){
  const warn = document.createElement("div");
  warn.className = "filewarn";
  warn.style.cssText = "background:#fdecec;color:#a33333;border-bottom-color:#f0baba";
  warn.innerHTML = "⚠ <b>ライブラリ (vendor フォルダ) が読み込めませんでした。</b>" +
    "ZIP の中から index.html を直接開いていませんか? ZIP ファイルを右クリック →「すべて展開」で展開してから、" +
    "展開後のフォルダ内の「サイトを起動.bat」(または index.html) を開いてください。";
  document.body.insertBefore(warn, $("#app"));
}
if(location.protocol === "file:"){
  const warn = document.createElement("div");
  warn.className = "filewarn";
  warn.innerHTML = "⚠ ファイルを直接開いているため、<b>動画編集・動画/音声の形式変換</b>は利用できません。" +
    "すべての機能を使うには「サイトを起動.bat」から起動するか、Web 公開版の URL からアクセスしてください。";
  document.body.insertBefore(warn, $("#app"));
}
window.addEventListener("hashchange", route);
route();

/* expose for tests */
window.TOOLS = TOOLS;
</script>
